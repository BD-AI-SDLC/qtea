line-length = 100
target-version = "py311"
src = ["src"]
extend-exclude = ["candidate_agents", ".qtea", ".venv"]

[lint]
select = ["E", "F", "I", "B", "UP", "S", "RUF", "SIM", "PL", "C4", "PTH"]
ignore = [
    "S101", "PLR0913", "PLR2004", "PLR0912", "PLR0915", "S603", "S607", "S404",
    "PLC0415",  # deferred/lazy imports — intentional (circular-import avoidance, startup perf)
    "PLR0911",  # too many return statements — structural, not a defect
    "E402",     # module-level import not at top — early-init patterns, TYPE_CHECKING guards
    "RUF001", "RUF002", "RUF003",  # ambiguous unicode (en-dash, multiplication sign) — intentional
    "PLW0603",  # global statement — intentional in a few modules
    "S110",     # try/except/pass — intentional in best-effort cleanup paths
    "S310",     # urlopen audit — intentional URL opening
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S", "PLR", "B", "E501", "E702", "SIM105", "PLW2901", "RUF005"]
"src/qtea/report/html_renderer.py" = ["E501"]
"src/qtea/cli.py" = ["B008", "E501"]

line-length = 100
target-version = "py311"
src = ["src"]
extend-exclude = ["candidate_agents", ".worca-t", ".venv"]

[lint]
select = ["E", "F", "I", "B", "UP", "S", "RUF", "SIM", "PL", "C4", "PTH"]
ignore = ["S101", "PLR0913", "PLR2004", "PLR0912", "PLR0915", "S603", "S607", "S404"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S", "PLR", "B", "E501", "E702", "SIM105", "PLW2901", "RUF005"]
"src/worca_t/report/html_renderer.py" = ["E501"]
"src/worca_t/cli.py" = ["B008", "PLC0415"]
"src/worca_t/logging_setup.py" = ["PLW0603"]
"src/worca_t/claude_runner.py" = ["SIM105", "S110"]
"src/worca_t/mcp_manager.py" = ["SIM105", "S110"]
